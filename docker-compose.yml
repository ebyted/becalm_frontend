services:
  becalm-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: becalm-frontend-container
    ports:
      - "8013:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://168.231.67.221:8011
      - REACT_APP_NAME=BeCalm
      - REACT_APP_VERSION=1.0.0
    restart: unless-stopped
    networks:
      - becalm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  becalm-network:
    driver: bridge
